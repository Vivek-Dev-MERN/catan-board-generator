<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catan Board</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1e1e1e;
            height: 100vh;
            margin: 0;
        }
        svg {
            background-color: #87CEEB; /* Ocean blue background */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .hex {
            stroke: #2c2c2c;
            stroke-width: 3;
        }
        .token-circle {
            fill: #FFFCE0;
            stroke: #333;
            stroke-width: 2;
        }
        .token-text {
            font-size: 22px;
            font-weight: 900;
            text-anchor: middle;
            font-family: monospace;
        }
        .res-text {
            font-size: 10px;
            font-weight: bold;
            text-anchor: middle;
            fill: rgba(0,0,0,0.6);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<svg id="board" width="800" height="800"></svg>

<script>
    const svg = document.getElementById('board');
    const hexSize = 65;
    const originX = 400;
    const originY = 400;

    const colors = {
        WOOD: "#3D8C40", BRICK: "#C25A3C", SHEEP: "#9ACD32",
        WHEAT: "#F4D03F", ORE: "#7F8C8D", DESERT: "#E6C280"
    };

    // 1. The Immutable Port Map
    // We now explicitly lock each port to a specific geometric edge angle
    const portMap = {
        "1,-2":  { label: "SHEEP 2:1", angle: 270 }, // Top
        "2,-2":  { label: "ANY 3:1",   angle: 330 }, // Top-Right
        "2,0":   { label: "ANY 3:1",   angle: 30  }, // Bottom-Right
        "1,1":   { label: "BRICK 2:1", angle: 90  }, // Bottom
        "-1,2":  { label: "WOOD 2:1",  angle: 150 }, // Bottom-Left
        "-2,2":  { label: "ANY 3:1",   angle: 150 }, // Bottom-Left
        "-2,1":  { label: "WHEAT 2:1", angle: 210 }, // Top-Left
        "-2,0":  { label: "ORE 2:1",   angle: 210 }, // Top-Left
        "-1,-1": { label: "ANY 3:1",   angle: 270 }  // Top
    };

    function drawHex(q, r, res, token) {
        const x = originX + hexSize * (3/2 * q);
        const y = originY + hexSize * ((Math.sqrt(3)/2 * q) + (Math.sqrt(3) * r));

        // Draw Hexagon
        let points = "";
        for (let i = 0; i < 6; i++) {
            const angle_rad = Math.PI / 180 * (60 * i);
            points += `${x + hexSize * Math.cos(angle_rad)},${y + hexSize * Math.sin(angle_rad)} `;
        }

        const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        polygon.setAttribute("points", points.trim());
        polygon.setAttribute("fill", colors[res] || "#fff");
        polygon.setAttribute("class", "hex");
        svg.appendChild(polygon);

        // Draw Resource Label
        const resText = document.createElementNS("http://www.w3.org/2000/svg", "text");
        resText.setAttribute("x", x);
        resText.setAttribute("y", y - 25);
        resText.setAttribute("class", "res-text");
        resText.textContent = res;
        svg.appendChild(resText);

        // Draw Number Token
        if (res !== "DESERT") {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", x);
            circle.setAttribute("cy", y + 10);
            circle.setAttribute("r", 20);
            circle.setAttribute("class", "token-circle");
            svg.appendChild(circle);

            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", x);
            text.setAttribute("y", y + 17);
            text.setAttribute("class", "token-text");
            text.setAttribute("fill", (token === 6 || token === 8) ? "#C0392B" : "#2C3E50");
            text.textContent = token;
            svg.appendChild(text);
        }

        // 2. Draw the Physical Dock and Fixed Port
        const portData = portMap[`${q},${r}`];
        if (portData) {
            const angleRad = portData.angle * Math.PI / 180;

            // Calculate the exact midpoint of the hex edge
            const edgeX = x + (hexSize * 0.866) * Math.cos(angleRad);
            const edgeY = y + (hexSize * 0.866) * Math.sin(angleRad);

            // Push the label further out into the water
            const portX = x + (hexSize * 1.5) * Math.cos(angleRad);
            const portY = y + (hexSize * 1.5) * Math.sin(angleRad);

            // Draw the wooden dock line
            const dock = document.createElementNS("http://www.w3.org/2000/svg", "line");
            dock.setAttribute("x1", edgeX);
            dock.setAttribute("y1", edgeY);
            dock.setAttribute("x2", portX);
            dock.setAttribute("y2", portY);
            dock.setAttribute("stroke", "#8B4513"); // Brown dock color
            dock.setAttribute("stroke-width", "8");
            svg.appendChild(dock);

            // Draw the white port background
            const portBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            portBg.setAttribute("x", portX - 35);
            portBg.setAttribute("y", portY - 10);
            portBg.setAttribute("width", 70);
            portBg.setAttribute("height", 20);
            portBg.setAttribute("rx", 10);
            portBg.setAttribute("fill", "#fff");
            portBg.setAttribute("stroke", "#333");
            portBg.setAttribute("stroke-width", "2");
            svg.appendChild(portBg);

            // Draw the port text
            const portTextLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
            portTextLabel.setAttribute("x", portX);
            portTextLabel.setAttribute("y", portY + 4);
            portTextLabel.setAttribute("font-size", "10px");
            portTextLabel.setAttribute("font-weight", "900");
            portTextLabel.setAttribute("text-anchor", "middle");
            portTextLabel.setAttribute("fill", "#333");
            portTextLabel.textContent = portData.label;
            svg.appendChild(portTextLabel);
        }
    }

    async function fetchBoard() {
        try {
            const response = await fetch('/api/board');
            if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);

            const boardData = await response.json();
            svg.innerHTML = '';
            boardData.forEach(hex => drawHex(hex.q, hex.r, hex.resource, hex.numberToken));
        } catch (error) {
            console.error("Failed to load board:", error);
            alert("Could not connect to the API. Is your Java server running on port 8080?");
        }
    }

    fetchBoard();
</script>
</body>
</html>
